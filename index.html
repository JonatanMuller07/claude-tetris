<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <div class="header-actions">
        <button id="info-btn" class="icon-btn" title="¿Qué hace cada power-up?">ℹ</button>
        <label class="theme-toggle" title="Cambiar tema claro/oscuro">
          <input type="checkbox" id="theme-toggle" />
          <span class="theme-toggle-slider"></span>
        </label>
      </div>
    </div>
    <div class="game-container">
      <aside class="panel controls-panel">
        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> reservar</li>
            <li><kbd>Q</kbd> habilidad</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>

      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section challenge-section hidden" id="challenge-section">
          <span class="label">DESAFÍO</span>
          <span class="challenge-name" id="challenge-name"></span>
          <span class="challenge-goal" id="challenge-goal"></span>
          <span class="challenge-timer hidden" id="challenge-timer"></span>
        </div>

        <div class="panel-section combo-section hidden" id="combo-section">
          <span class="label">COMBO</span>
          <span class="value combo-value" id="combo-value">x1</span>
        </div>

        <div class="panel-section energy-section">
          <span class="label">HABILIDAD</span>
          <div class="energy-bar">
            <div class="energy-fill" id="energy-fill"></div>
          </div>
          <span class="energy-hint hidden" id="energy-hint">Q: usar habilidad</span>
        </div>

        <div class="panel-section hold-section hidden" id="hold-section">
          <span class="label">RESERVA</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section vision-section hidden" id="vision-section">
          <span class="label">PRÓXIMAS 5</span>
          <canvas id="vision-canvas" width="180" height="36"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>
      </aside>

      <div id="overlay" class="overlay hidden">
        <div class="overlay-box">
          <p id="overlay-title">GAME OVER</p>
          <p id="overlay-score"></p>
          <button id="restart-btn">Reiniciar</button>
        </div>
      </div>

      <div id="challenge-overlay" class="overlay challenge-overlay">
        <div class="challenge-box">
          <p class="challenge-title">ELEGÍ DESAFÍO</p>
          <ul id="challenge-list" class="challenge-list"></ul>
        </div>
      </div>

      <div id="skill-overlay" class="overlay skill-overlay hidden">
        <div class="skill-box">
          <p class="skill-title">ELEGÍ HABILIDAD</p>
          <ul id="skill-list" class="skill-list"></ul>
        </div>
      </div>
    </div>

    <div id="info-overlay" class="overlay info-overlay hidden">
      <div class="info-box">
        <div class="info-header">
          <p class="info-title">POWER-UPS</p>
          <button id="info-close-btn" class="icon-btn" title="Cerrar">✕</button>
        </div>
        <ul id="powerup-list" class="powerup-list"></ul>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
